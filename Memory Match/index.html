<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Match – Premium Browser Game</title>
<meta name="description" content="Elegant memory card matching game with smooth 3D flip animations and multiple difficulties."/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 40%,#f093fb 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:20px;
}
h1{font-size:2.4rem;font-weight:900;color:#fff;text-shadow:0 3px 20px rgba(0,0,0,.2);letter-spacing:-1px}
.subtitle{color:rgba(255,255,255,.85);font-size:.9rem;margin-top:-12px;font-weight:500}

/* Difficulty tabs */
.diff-tabs{
  background:#fff;border-radius:50px;padding:5px;
  display:flex;gap:4px;box-shadow:0 6px 24px rgba(0,0,0,.14);
}
.diff-btn{
  padding:9px 22px;border-radius:40px;border:none;
  background:transparent;color:#718096;
  font-family:'Outfit',sans-serif;font-size:.87rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.diff-btn.active{
  background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
  box-shadow:0 3px 14px rgba(102,126,234,.4);
}
.diff-btn:not(.active):hover{color:#667eea}

/* Stats bar */
.stats-bar{
  background:#fff;border-radius:20px;padding:12px 22px;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 6px 24px rgba(0,0,0,.12);flex-wrap:wrap;justify-content:center;
}
.stat-item{display:flex;align-items:center;gap:8px;font-weight:700;color:#2d3748;font-size:.95rem}
.stat-badge{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border-radius:10px;padding:5px 14px;font-weight:900;font-size:1rem;
  min-width:44px;text-align:center;
}
.stat-badge.green{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#155724}
.stat-badge.orange{background:linear-gradient(135deg,#f6d365,#fda085);color:#7a3d00}

.btn-new{
  padding:10px 22px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
  font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:800;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 18px rgba(102,126,234,.35);
}
.btn-new:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(102,126,234,.5)}

/* Card grid */
#grid{
  display:grid;gap:10px;
  background:#fff;border-radius:24px;padding:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
}

/* Card */
.card{perspective:700px;cursor:pointer}
.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
/* Card back */
.back{
  background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);
  border:none;
  box-shadow:0 4px 14px rgba(102,126,234,.3);
  position:relative;overflow:hidden;
}
.back::before{
  content:'✦';font-size:1.6rem;color:rgba(255,255,255,.5);
}
.back::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
}

/* Card front */
.front{
  background:#fff;border:2px solid #e9d5ff;transform:rotateY(180deg);
  font-size:2rem;
  box-shadow:0 4px 16px rgba(102,126,234,.1);
}
.card.matched .front{
  background:linear-gradient(135deg,rgba(102,126,234,.08),rgba(118,75,162,.08));
  border-color:#a78bfa;
  box-shadow:0 0 20px rgba(102,126,234,.25);
  animation:matchPop .3s ease-out;
}
@keyframes matchPop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.12)}100%{transform:rotateY(180deg) scale(1)}}

/* Card hover */
.card:not(.flipped):not(.matched):hover .back{
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(102,126,234,.45);
}

/* Victory overlay */
.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:rgba(255,255,255,.96);opacity:0;pointer-events:none;
  transition:opacity .35s;z-index:20;
}
.overlay.show{opacity:1;pointer-events:all}
.overlay-icon{font-size:5rem;animation:bounce .6s infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.overlay h2{
  font-size:2.2rem;font-weight:900;
  background:linear-gradient(135deg,#667eea,#f093fb);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.overlay p{color:#718096;font-size:.95rem;font-weight:500}
.result-pill{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;border-radius:50px;padding:10px 28px;font-weight:700;font-size:.95rem;
}
.btn-play{
  padding:14px 40px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);color:#fff;
  font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:800;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 6px 24px rgba(102,126,234,.4);
}
.btn-play:hover{transform:scale(1.06);box-shadow:0 10px 32px rgba(102,126,234,.6)}
</style>
</head>
<body>
<h1>🃏 Memory Match</h1>
<p class="subtitle">Find all matching pairs as fast as you can!</p>

<div class="diff-tabs">
  <button class="diff-btn active" data-d="easy">🟢 Easy (4×4)</button>
  <button class="diff-btn" data-d="med">🟡 Medium (6×4)</button>
  <button class="diff-btn" data-d="hard">🔴 Hard (6×6)</button>
</div>

<div class="stats-bar">
  <div class="stat-item">🎯 Moves <span class="stat-badge orange" id="moves">0</span></div>
  <div class="stat-item">✅ Pairs <span class="stat-badge green" id="pairs">0</span></div>
  <div class="stat-item">⏱ Time <span class="stat-badge" id="timer">0s</span></div>
  <button class="btn-new" id="btnNew">↺ New Game</button>
</div>

<div id="grid"></div>

<div class="overlay" id="overlay">
  <div class="overlay-icon">🎉</div>
  <h2>You Win!</h2>
  <p>Amazing memory! Here's your result:</p>
  <div class="result-pill" id="resultPill"></div>
  <button class="btn-play" id="btnPlay">▶  Play Again</button>
</div>

<script>
const EMOJIS=[
  '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼',
  '🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔',
  '🦄','🦋','🌸','🌺','⭐','🍕','🎸','🎮',
  '🏆','🎯','💎','🚀','🌈','🦀','🔮','🎭','🍦'
];

const DIFFS={easy:{cols:4,rows:4},med:{cols:6,rows:4},hard:{cols:6,rows:6}};
let diff='easy',cards,flipped,matched,moves,elapsed,timerInt,lock;

function init(){
  clearInterval(timerInt);
  elapsed=0;moves=0;matched=0;flipped=[];lock=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent=0;
  document.getElementById('timer').textContent='0s';
  document.getElementById('overlay').classList.remove('show');

  const{cols,rows}=DIFFS[diff];
  const total=cols*rows;
  const pool=EMOJIS.slice(0,total/2);
  const deck=[...pool,...pool].sort(()=>Math.random()-.5);
  cards=deck.map((e,i)=>({id:i,emoji:e,flipped:false,matched:false}));

  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  // Card size responsive
  const maxW=Math.min(window.innerWidth*.9,cols*90+cols*10+32);
  const cw=Math.floor((maxW-32-10*(cols-1))/cols);
  const ch=Math.round(cw);

  grid.innerHTML='';
  cards.forEach(card=>{
    const el=document.createElement('div');
    el.className='card';
    el.style.width=cw+'px';el.style.height=ch+'px';
    el.dataset.id=card.id;
    el.innerHTML=`
      <div class="card-inner">
        <div class="face back"></div>
        <div class="face front">${card.emoji}</div>
      </div>`;
    el.addEventListener('click',()=>onFlip(card.id));
    grid.appendChild(el);
  });

  timerInt=setInterval(()=>{
    elapsed++;
    document.getElementById('timer').textContent=elapsed+'s';
  },1000);
}

function onFlip(id){
  if(lock)return;
  const card=cards[id];
  if(card.flipped||card.matched)return;
  card.flipped=true;
  const el=document.querySelector(`.card[data-id="${id}"]`);
  el.classList.add('flipped');
  flipped.push(id);

  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    lock=true;
    const[a,b]=flipped;
    if(cards[a].emoji===cards[b].emoji){
      // Match!
      setTimeout(()=>{
        cards[a].matched=cards[b].matched=true;
        [a,b].forEach(i=>document.querySelector(`.card[data-id="${i}"]`).classList.add('matched'));
        matched++;document.getElementById('pairs').textContent=matched;
        flipped=[];lock=false;
        const{cols,rows}=DIFFS[diff];
        if(matched===cols*rows/2){clearInterval(timerInt);showWin();}
      },300);
    }else{
      // No match - shake effect + flip back
      setTimeout(()=>{
        [a,b].forEach(i=>{
          cards[i].flipped=false;
          const el2=document.querySelector(`.card[data-id="${i}"]`);
          el2.classList.remove('flipped');
        });
        flipped=[];lock=false;
      },950);
    }
  }
}

function showWin(){
  document.getElementById('resultPill').textContent=`${moves} moves · ${elapsed} seconds`;
  document.getElementById('overlay').classList.add('show');
}

document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');diff=b.dataset.d;init();
}));
document.getElementById('btnNew').addEventListener('click',init);
document.getElementById('btnPlay').addEventListener('click',init);
init();
</script>
</body>
</html>
