<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minesweeper – Premium Browser Game</title>
<meta name="description" content="Classic Minesweeper with vibrant design, three difficulty levels, and smooth animations."/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;min-height:100vh;
  background:linear-gradient(135deg,#4facfe 0%,#00f2fe 40%,#43e97b 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:20px;
}
h1{font-size:2.4rem;font-weight:900;color:#fff;text-shadow:0 3px 20px rgba(0,0,0,.2);letter-spacing:-1px}
.subtitle{color:rgba(255,255,255,.85);font-size:.9rem;margin-top:-12px;font-weight:500}

/* Difficulty tabs */
.diff-tabs{
  background:#fff;border-radius:50px;padding:5px;
  display:flex;gap:4px;box-shadow:0 6px 24px rgba(0,0,0,.12);
}
.diff-btn{
  padding:8px 20px;border-radius:40px;border:none;
  background:transparent;color:#718096;font-family:'Outfit',sans-serif;
  font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;
}
.diff-btn.active{
  background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;
  box-shadow:0 3px 12px rgba(79,172,254,.4);
}
.diff-btn:not(.active):hover{color:#4facfe;}

/* HUD */
.hud{
  background:#fff;border-radius:20px;padding:12px 20px;
  display:flex;align-items:center;gap:16px;
  box-shadow:0 6px 24px rgba(0,0,0,.12);flex-wrap:wrap;justify-content:center;
}
.hud-item{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.95rem;color:#2d3748}
.hud-badge{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;border-radius:10px;padding:4px 12px;font-weight:800;font-size:1rem;
  min-width:42px;text-align:center;
}
.hud-badge.danger{background:linear-gradient(135deg,#f5576c,#f093fb)}
.hud-badge.timer{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#155724}
.btn-reset{
  padding:9px 20px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:800;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 16px rgba(79,172,254,.35);
}
.btn-reset:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(79,172,254,.5)}

/* Board */
.board-wrap{
  background:#fff;border-radius:22px;padding:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);overflow:auto;max-width:95vw;
  position:relative;
}
#board{display:grid;gap:4px}

.cell{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:800;
  background:linear-gradient(135deg,#e8f4fd,#d0ebff);
  border:1.5px solid #bee3f8;
  transition:all .12s;user-select:none;
  box-shadow:0 2px 6px rgba(79,172,254,.15);
}
.cell:hover:not(.open):not(.flagged){
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  border-color:#4facfe;color:#fff;transform:scale(1.08);
  box-shadow:0 4px 14px rgba(79,172,254,.4);
}
.cell.open{
  background:#f0f9ff;border-color:#e2f0ff;cursor:default;
  box-shadow:inset 0 2px 4px rgba(79,172,254,.1);transform:none;
}
.cell.flagged{
  background:linear-gradient(135deg,#fff5f5,#fed7d7);border-color:#fc8181;
  box-shadow:0 2px 8px rgba(252,129,129,.3);
}
.cell.mine-hit{
  background:linear-gradient(135deg,#f5576c,#f093fb);border-color:#f5576c;
  animation:boom .35s ease-out;
}
.cell.mine-show{background:#fff0f3;border-color:#feb2b2}
@keyframes boom{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}

/* Number colors */
.n1{color:#2b6cb0}.n2{color:#276749}.n3{color:#c53030}.n4{color:#553c9a}
.n5{color:#c05621}.n6{color:#065666}.n7{color:#1a202c}.n8{color:#718096}

/* Result bar */
.result-bar{
  font-size:.95rem;font-weight:700;min-height:28px;text-align:center;
  padding:6px 20px;border-radius:30px;transition:all .3s;
}
.result-bar.win{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#1a4731;box-shadow:0 4px 16px rgba(67,233,123,.4)}
.result-bar.lose{background:linear-gradient(135deg,#f5576c,#f093fb);color:#fff;box-shadow:0 4px 16px rgba(245,87,108,.4)}
.result-bar.idle{background:transparent;color:rgba(255,255,255,.85)}
</style>
</head>
<body>
<h1>💣 Minesweeper</h1>
<p class="subtitle">Find all the mines — but don't trigger them!</p>

<div class="diff-tabs">
  <button class="diff-btn active" data-d="easy">🟢 Easy</button>
  <button class="diff-btn" data-d="med">🟡 Medium</button>
  <button class="diff-btn" data-d="hard">🔴 Hard</button>
</div>

<div class="hud">
  <div class="hud-item">💣 <div class="hud-badge danger" id="mineCount">10</div></div>
  <div class="hud-item">🚩 <div class="hud-badge" id="flagCount">0</div></div>
  <div class="hud-item">⏱ <div class="hud-badge timer" id="timer">0</div></div>
  <button class="btn-reset" id="btnReset">↺ New Game</button>
</div>

<div class="board-wrap"><div id="board"></div></div>
<div class="result-bar idle" id="resultBar">Left-click reveal · Right-click flag</div>

<script>
const DIFFS={easy:{r:9,c:9,m:10},med:{r:16,c:16,m:40},hard:{r:16,c:30,m:99}};
let diff='easy',rows,cols,mines,board,revealed,flagged,gameOver,firstClick,timerInt,elapsed;

function init(){
  const d=DIFFS[diff];rows=d.r;cols=d.c;mines=d.m;
  board=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;firstClick=true;elapsed=0;
  clearInterval(timerInt);
  document.getElementById('timer').textContent=0;
  document.getElementById('mineCount').textContent=mines;
  document.getElementById('flagCount').textContent=0;
  const rb=document.getElementById('resultBar');
  rb.textContent='Left-click reveal · Right-click flag';rb.className='result-bar idle';
  renderBoard();
}

function placeMines(sr,sc){
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows),c=Math.floor(Math.random()*cols);
    if(board[r][c]===-1||(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1))continue;
    board[r][c]=-1;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(board[r][c]===-1)continue;
    let cnt=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===-1)cnt++;}
    board[r][c]=cnt;
  }
}

function renderBoard(){
  const el=document.getElementById('board');
  el.style.gridTemplateColumns=`repeat(${cols},38px)`;
  el.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    cell.className='cell';cell.dataset.r=r;cell.dataset.c=c;
    styleCell(cell,r,c);
    cell.addEventListener('click',onLeft);
    cell.addEventListener('contextmenu',onRight);
    el.appendChild(cell);
  }
}

function styleCell(el,r,c){
  el.className='cell';el.textContent='';
  if(flagged[r][c]){el.classList.add('flagged');el.textContent='🚩';return;}
  if(!revealed[r][c])return;
  if(board[r][c]===-1){el.classList.add('mine-show');el.textContent='💣';return;}
  el.classList.add('open');
  const v=board[r][c];
  if(v){el.textContent=v;el.classList.add('n'+v);}
}

function getCell(r,c){return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);}

function onLeft(e){
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  if(firstClick){firstClick=false;placeMines(r,c);startTimer();}
  reveal(r,c);checkWin();
}

function onRight(e){
  e.preventDefault();
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  styleCell(getCell(r,c),r,c);
  document.getElementById('flagCount').textContent=flagged.flat().filter(Boolean).length;
}

function reveal(r,c){
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;const el=getCell(r,c);
  if(board[r][c]===-1){el.classList.add('mine-hit');el.textContent='💥';endGame(false);return;}
  styleCell(el,r,c);
  if(board[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(r+dr,c+dc);
}

function checkWin(){
  if(revealed.flat().filter(Boolean).length===rows*cols-mines)endGame(true);
}

function endGame(win){
  gameOver=true;clearInterval(timerInt);
  const rb=document.getElementById('resultBar');
  if(win){rb.textContent='🎉 You Win! All mines safely avoided!';rb.className='result-bar win';}
  else{
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)
      if(board[r][c]===-1&&!flagged[r][c]){revealed[r][c]=true;styleCell(getCell(r,c),r,c);}
    rb.textContent='💥 Boom! Better luck next time!';rb.className='result-bar lose';
  }
}

function startTimer(){timerInt=setInterval(()=>{elapsed++;document.getElementById('timer').textContent=elapsed;},1000);}

document.querySelectorAll('.diff-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');diff=btn.dataset.d;init();
}));
document.getElementById('btnReset').addEventListener('click',init);
init();
</script>
</body>
</html>
